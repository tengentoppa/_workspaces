# 來源 repo 清單。bootstrap.{sh,ps1} 會依此 clone 到正確相對位置。
#
# 路徑相對於 _workspaces/ 的 parent (即 D:/Documents/Project/)。
# 新機器使用流程：
#   1. mkdir Project && cd Project
#   2. git clone <_workspaces remote> _workspaces
#   3. cd _workspaces && ./bootstrap.sh   (Windows: .\bootstrap.ps1)
#
# 註：每筆 entry 的 branch 是「初次 clone 時要 checkout 的 branch」，
#     之後本地各自切換 branch，bootstrap 不會強迫覆寫。

repos:
  # ─── sport_scout workspace ───
  - name: sport_spy
    url: https://github.com/on-the-sky/sport_spy.git
    path: scout/sport_spy
    branch: main
  - name: sport_scout
    url: https://github.com/on-the-sky/sport_scout.git
    path: scout/sport_scout
    branch: main
  - name: sport_logistics
    url: https://github.com/on-the-sky/sport_logistics.git
    path: scout/sport_logistics
    branch: main
  - name: scout_manager
    url: https://github.com/on-the-sky/scout_manager.git
    path: scout/scout_manager
    branch: main
  # research 目前沒設 remote (本機資料夾)，先不放入；要分享請手動 init + push

  # ─── samurai workspace ───
  - name: samurai
    url: https://github.com/on-the-sky/samurai.git
    path: samurai/samurai
    branch: main
  - name: bot_manager
    url: https://github.com/on-the-sky/bot_manager.git
    path: samurai/bot_manager
    branch: main
  - name: sentinel
    url: https://github.com/royal98dev/sentinel.git
    path: samurai/sentinel
    branch: main

  # ─── safe_trade workspace ───
  - name: safe_trade
    url: https://github.com/royal98dev/safe_trade.git
    path: royal/safe_trade
    branch: main
  - name: sport_scout_royal
    url: https://github.com/royal98dev/sport_scout_royal.git
    path: royal/sport_scout_royal
    branch: main
  - name: core_wallet
    url: https://github.com/royal98dev/core_wallet.git
    path: royal/core_wallet
    branch: main
  - name: crypto_hound
    url: https://github.com/royal98dev/crypto_hound.git
    path: royal/crypto_hound
    branch: main
  - name: union_wallet
    url: https://github.com/on-the-sky/union_wallet.git
    path: royal/union_wallet
    branch: main
  - name: devops
    url: https://github.com/royal98dev/devops.git
    path: royal/devops
    branch: main
  - name: research
    url: https://github.com/on-the-sky/research.git
    path: scout/research
    branch: main
  - name: grafana-mcp
    url: https://github.com/on-the-sky/grafana-mcp.git
